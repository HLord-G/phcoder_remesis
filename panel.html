<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    outline: 0;
    box-sizing: border-box;
}

body{
    height:100vh;
    width:100%;
}
        .feheee{
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100vh;
            z-index:999999999999999999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0b0b0b;
           
            .holderofthis{
            width:100%;
            height:100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding:5px;

                    .imgpreviews{
                        height:100%;
                        width:100%;
                        flex:2;
                        border:1px solid rgba(218, 165, 32, 0.253);
                    }

                    .sidepanels{
                            height:100%;
                            width:100%;
                            border:1px solid rgba(218, 165, 32, 0.253);
                            padding:20px;
                            text-align: left;

                            flex:1;
                            position:relative;
                            display:flex;
                            flex-direction:column;
                            justify-content: space-between;
                            align-items: center;
                            gap:10px;
                            background-color: #111111;
                            color: white;

                            box-shadow: -7px 1px 17px 4px rgba(0,0,0,0.33);
                            -webkit-box-shadow: -7px 1px 17px 4px rgba(0,0,0,0.33);
                            -moz-box-shadow: -7px 1px 17px 4px rgba(0,0,0,0.33);



                             .panels{
                                width:100%;
                                h1{
                                    margin-bottom:10px;
                                        }       

                                    .btbarea{
                                        width:300px;
                                        display: flex;
                                        justify-content: flex-start;
                                        align-items: center;
                                        gap:5px;

                                        .jfyeb:nth-child(1){
                                            flex:1;
                                            text-align:center;
                                            text-decoration:none;
                                            background:#d8a520;
                                            color:#111;
                                            padding:11px;
                                            border-radius:8px;
                                            font-size:14px;
                                            font-weight:700;
                                            transition:.3s;
                                            outline:0;
                                            border:
                                            1px solid #d8a520;
                                        }
                                        .jfyeb:nth-child(2){
                                            flex:3;
                                            text-align:center;
                                            text-decoration:none;
                                            background:#131313;
                                            border:
                                            1px solid rgba(216,165,32,0.18);
                                            color:#d8a520;
                                            padding:11px;
                                            border-radius:8px;
                                            font-size:14px;
                                            font-weight:600;
                                            transition:.3s;
                                            outline:0;
                                        }

                                        .jfyeb{
                                            padding:8px 10px;
                                        }
                                    }

                                     text-align: left;       
                                   div{
                                    width:100%;

                                     text-align: left;     
                                     p{
                                     text-align: left;     

                                     }  

                                   }
                             }
                    }
            }



        }


        @media(max-width:728px) {
            .feheee{
                 .holderofthis{
                    padding:10px;
                    flex-flow: column;
                    
                    .imgpreviews{
                        flex:4;
                    }
                     .sidepanels{
                        flex: 1;
                        box-shadow: 0px -4px 10px 4px rgba(0,0,0,0.33);
                        -webkit-box-shadow: 0px -4px 10px 4px rgba(0,0,0,0.33);
                        -moz-box-shadow: 0px -4px 10px 4px rgba(0,0,0,0.33);

                       .panels:nth-child(2){
                            order: 1;
                            margin-bottom:30px;
                        }

                        .panels:nth-child(1){
                            order: 2;
                        }

                        .panels{

                        .btbarea{
                            width:100%;
                        }
                            div{
                                p{
                                    display:-webkit-box;
                                    -webkit-line-clamp:2;
                                    -webkit-box-orient:vertical;
                                    overflow:hidden;
                                    }
                                }
                        }
 
                     }
                 }
            }
        }
    </style>
</head>
<body>
    

    <div class="feheee">
        <div class="holderofthis">
                <div class="imgpreviews">

                </div>
                <div class="sidepanels">
                    
                    <div class="panels">
                        <h3>title</h1>
                        <div>
                            <p>
                                Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quidem, fugit rerum. Minima similique expedita totam? Optio ut, quas dolore mollitia nostrum qui, hic asperiores pariatur aut iure, impedit voluptatum officia.
                            </p>
                        </div>
                    </div>


                    <div class="panels">
                        <div class="btbarea">
                            <button class="jfyeb">Buy</button>
                            <button class="jfyeb">Preview</button>
                        </div>
                    </div>

                </div>
        </div>
    </div>


</body>
</html>
